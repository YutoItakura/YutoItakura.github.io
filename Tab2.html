<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tab2</title>
    </head>
    <style>
        @media(max-width:600px){
            body{
            background-color: rgb(32, 32, 32);
            display: block;
            margin: 0;
            text-align: center;
            }
            .header{
            display: flex;
            background-color:rgb(32, 32, 32);
            color: white;
            text-align: center;
            }
            .headertext{
            position: relative;
            color: white;
            font-size: 20px;
            font-weight: bold;
            left: 30px;
            font-family:sans-serif
            }
            hr{
                border-top: 2px solid grey ;
                margin:1px ;
            }
            .selectfile{
                color: white;
            }
            h1{
                color: white;
                margin-top: 40px;
            }
            button{
                border-radius: 5px;
                height: 30px;
                width: 100px;
                margin: 20px;
            }
            #resultimage{
                width: 400px;
                height: 400px;
                display: none;
                margin: auto;
            }
        }
    </style>
    <body>
        <div class="header">
            <p class="headertext">Dashboard</p>
        </div>
        <hr>
        <div>
         <h1>ここはtab2です</h1>
        </div>
        <div>
         <input type="file" class="selectfile" id="selectfile" accept="images/*,videos/*">
         <br>
         <button onclick="sendfile()">send</button>
         <p id="output"></p>
         <img id="resultimage">
        </div>
    </body>
    <script>
        async function sendfile() {
            let input=document.getElementById('selectfile');
            let output=document.getElementById('output')
            let file=input.files[0];
            if (!file) {
                alert("画像を選択してください！");
                return;
            }

            let formData = new FormData();
            formData.append("file", file);

            fetch("http://192.168.0.30:5000/upload", {
                method: "POST",
                body: formData
            })
            .then(response => {
        if (response.headers.get("Content-Type").includes("image")) {
            return response.blob();  // 画像を受信
        } else {
            return response.json();  // テキスト (JSON) を受信
        }
    })
    .then(data => {
        if (data instanceof Blob) {
            let img=document.getElementById("resultimage");
            let url = URL.createObjectURL(data);
            img.src=url;
            img.style.display='block'
        } else {
            alert("サーバーからの応答: " + data.message);
        }
    })
    .catch(error => console.error("エラー:", error));
            
        }
    </script>
</html>
