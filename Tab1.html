<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Tab1</title>
    </head>
    <style>
        body{
            text-align: center;
            margin: 0;
            justify-content: center;
            align-items: center;
            background-color: rgb(32, 32, 32);;
        }
        .header{
            display: flex;
            color: white;
            text-align: center;
        }
        .headertext{
            position: relative;
            left: 30px;
            font-family: sans-serif;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
        hr{
                border-top: 2px solid grey ;
                margin:1px ;
        }
        .btn-border-bottom {
             position: absolute;
             display: inline-block;
             padding: 0.25em 0;
             text-decoration: none;
             color: white; 
             right: 15px;
             top: 10px; 
            }

        .btn-border-bottom:before {
             position: absolute;
             content: '';
             width: 100%;
             height: 4px;
             top:100%;
             left: 0;
             border-radius: 3px;
             background:white;
             transition: .2s;
            }

        .btn-border-bottom:hover:before {
             top: -webkit-calc(100% - 3px);
             top: calc(100% - 3px);
            }
        .drawer {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #333;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            }
        .drawer a {
              padding: 8px 16px;
              text-decoration: none;
              font-size: 20px;
              color: white;
              display: block;
              transition: 0.3s;
            }
        .drawer a:hover {
              background-color: #575757;
            }
        .drawer-open {
                width: 250px;
            }
        .notify{
                width: 640px;
                margin-top: 20px;
                margin-bottom: 100px;
            }
        h1{
            color: white;
        }
        span{
                color: white;
            }
        p1{
            color: white;
        }
        .LINE{
            margin-bottom: 100px;
            width: 100px;
        }


    </style>
    <body>
        <div class="header">
            <p class="headertext">Notifications</p>
        </div>
        <a href="#" class="btn-border-bottom" onclick="togglemenu()">menu</a>
        <div id="drawer" class="drawer">
            <a href="#" onclick="togglemenu()">Close</a>
            <a href="test1.html">Home</a>
            <a href="Tab2.html">Disease Detection</a>
            <a href="Tab3.html">Spraying System</a>

        </div>
        <hr>
        <h1>Date:<span id="date"></span></h1>
        <img class='notify'src='result1.jpg'>
        <div>
            <p1>Follow This LINE Account!</p1>
            <br>
            <p1>↓</p1>
            <br>
            <img class="LINE" src="LINE.png">
        </div>
        <script>
            function togglemenu(){
                const drawer=document.getElementById('drawer');
                drawer.classList.toggle('drawer-open');
            }
            function DisplayDate(){
                const today=new Date();
                const year=today.getFullYear();
                const month=today.getMonth()+1;
                const day=today.getDate();
                document.getElementById('date').innerText=`${year}-${month}-${day}`;
            }
            window.onload=DisplayDate;
        </script>
    </body>
</html>
